services:
  postpres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGPORT: ${DB_PORT}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./codethium-ai-web/server
    ports:
      - "${PORT}:${PORT}"
    env_file: ./.env
    depends_on:
      postpres:
        condition: service_healthy

  frontend:
    build:
      context: ./codethium-ai-web
      args:
        REACT_APP_API_URL: http://localhost:${PORT}
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
